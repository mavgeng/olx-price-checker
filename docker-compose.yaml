services:
  nginx:
    container_name: nginx
    image: nginx:stable-alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./src:/var/www/laravel
    depends_on:
      - php-fpm
    networks:
      - app

  php-fpm:
    build:
      args:
        HOST_USER_ID: "${HOST_USER_ID:-1000}"
        HOST_GROUP_ID: "${HOST_GROUP_ID:-1000}"
      context: docker
      dockerfile: php-fpm/Dockerfile
    user: "${HOST_USER_ID:-1000}:${HOST_GROUP_ID:-1000}"
    volumes:
      - ./src:/var/www/laravel
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mysql
    networks:
      - app

  php-cli:
    build:
      args:
        HOST_USER_ID: "${HOST_USER_ID:-1000}"
        HOST_GROUP_ID: "${HOST_GROUP_ID:-1000}"
      context: docker
      dockerfile: php-cli/Dockerfile
    user: "${HOST_USER_ID:-1000}:${HOST_GROUP_ID:-1000}"
    volumes:
      - ./src:/var/www/laravel
    networks:
      - app
    profiles: [ "tools" ]

  horizon:
    container_name: horizon
    build:
      args:
        HOST_USER_ID: "${HOST_USER_ID:-1000}"
        HOST_GROUP_ID: "${HOST_GROUP_ID:-1000}"
      context: docker
      dockerfile: php-cli/Dockerfile
    user: "${HOST_USER_ID:-1000}:${HOST_GROUP_ID:-1000}"
    command: php artisan horizon
    volumes:
      - ./src:/var/www/laravel
    depends_on:
      - redis
      - mysql
    restart: unless-stopped
    networks:
      - app

  scheduler:
    container_name: scheduler
    build:
      args:
        HOST_USER_ID: "${HOST_USER_ID:-1000}"
        HOST_GROUP_ID: "${HOST_GROUP_ID:-1000}"
      context: docker
      dockerfile: php-cli/Dockerfile
    user: "${HOST_USER_ID:-1000}:${HOST_GROUP_ID:-1000}"
    command: php artisan schedule:work
    volumes:
      - ./src:/var/www/laravel
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - app

  mysql:
    container_name: mysql
    image: mysql:8.0
    ports:
      - "3306:3306"
    env_file:
      - env/mysql.env
    networks:
      - app

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin/phpmyadmin:latest
    depends_on:
      - mysql
    env_file:
      - env/phpmyadmin.env
    ports:
      - "8080:80"
    networks:
      - app

  redis:
    container_name: redis
    image: redis:8.8-alpine
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 60s
      timeout: 3s
      retries: 5
    networks:
      - app

  mailpit:
    container_name: mailpit
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - app

  composer:
    container_name: composer
    build:
      args:
        HOST_USER_ID: "${HOST_USER_ID:-1000}"
        HOST_GROUP_ID: "${HOST_GROUP_ID:-1000}"
      context: docker
      dockerfile: composer/Dockerfile
    user: "${HOST_USER_ID:-1000}:${HOST_GROUP_ID:-1000}"
    volumes:
      - ./src:/var/www/laravel
    profiles: ["tools"]

networks:
  app:

volumes:
  redis_data: